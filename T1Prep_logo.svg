<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect x="0"   y="0"   width="400" height="400" fill="#f4f1ea"/>
  <rect x="400" y="0"   width="400" height="400" fill="#141414"/>
  <rect x="0"   y="400" width="400" height="100" fill="#141414"/>
  <rect x="400" y="400" width="400" height="100" fill="#f4f1ea"/>

  <!-- ============ CAT ============ -->
  <g transform="translate(200, 220)">
    <path d="M 95 85 C 142 78, 168 110, 156 144 C 144 174, 102 178, 88 148 C 96 150, 116 156, 130 142 C 144 126, 132 102, 98 108 Z" fill="#141414"/>
    <path d="M -105 130 C -118 90, -125 40, -115 -10 C -110 -40, -100 -65, -85 -85 L -52 -138 L -28 -78 C -10 -85, 10 -85, 28 -78 L 52 -138 L 85 -85 C 100 -65, 110 -40, 115 -10 C 125 40, 118 90, 105 130 C 90 144, 60 150, 0 150 C -60 150, -90 144, -105 130 Z" fill="#141414"/>
    <ellipse cx="-34" cy="-22" rx="22" ry="27" fill="#FFCC2A"/>
    <ellipse cx="34"  cy="-22" rx="22" ry="27" fill="#FFCC2A"/>
    <ellipse cx="-34" cy="-22" rx="4" ry="20" fill="#0a0a0a"/>
    <ellipse cx="34"  cy="-22" rx="4" ry="20" fill="#0a0a0a"/>
    <circle cx="-28" cy="-33" r="3.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="40"  cy="-33" r="3.5" fill="#ffffff" opacity="0.9"/>
    <g stroke="#3a3a3a" stroke-width="1.5" stroke-linecap="round" opacity="0.55">
      <line x1="-22" y1="22" x2="-94" y2="14"/>
      <line x1="-22" y1="32" x2="-94" y2="40"/>
      <line x1="22"  y1="22" x2="94"  y2="14"/>
      <line x1="22"  y1="32" x2="94"  y2="40"/>
    </g>
    <path d="M -5 7 Q 0 14 5 7 Z" fill="#FFCC2A" opacity="0.65"/>
  </g>

  <!-- ============ BRAIN ============ -->
  <g transform="translate(600, 205) rotate(180)">

    <!-- Brainstem -->
    <path d="M -16 116 C -12 138, 12 138, 16 116 Z" fill="#fafafa"/>

    <!-- LEFT hemisphere - lumpy outline -->
    <path d="M -4 -134
             C -24 -136, -42 -130, -54 -120
             C -66 -130, -82 -132, -94 -122
             C -110 -126, -124 -114, -126 -98
             C -138 -90, -144 -74, -136 -60
             C -148 -52, -150 -32, -140 -22
             C -152 -8, -150 12, -140 22
             C -148 38, -140 56, -126 58
             C -126 74, -114 88, -100 86
             C -94 102, -78 112, -64 106
             C -54 120, -36 124, -22 116
             C -14 122, -8 122, -4 118
             Z"
          fill="#fafafa"/>

    <!-- RIGHT hemisphere - mirrored -->
    <path d="M 4 -134
             C 24 -136, 42 -130, 54 -120
             C 66 -130, 82 -132, 94 -122
             C 110 -126, 124 -114, 126 -98
             C 138 -90, 144 -74, 136 -60
             C 148 -52, 150 -32, 140 -22
             C 152 -8, 150 12, 140 22
             C 148 38, 140 56, 126 58
             C 126 74, 114 88, 100 86
             C 94 102, 78 112, 64 106
             C 54 120, 36 124, 22 116
             C 14 122, 8 122, 4 118
             Z"
          fill="#fafafa"/>

    <!-- LEFT hemisphere - meandering organic gyri lines -->
    <g stroke="#141414" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">

      <!-- Long winding stroke from frontal pole down to lateral edge (loose central-sulcus stylization) -->
      <path d="M -28 -118
               C -50 -110, -60 -92, -74 -88
               C -90 -84, -100 -72, -94 -56
               C -88 -42, -106 -36, -118 -42
               C -130 -48, -134 -28, -128 -14"/>

      <!-- Frontal lobe arc + branch -->
      <path d="M -8 -100
               C -20 -88, -36 -84, -42 -68
               C -46 -56, -38 -46, -28 -50
               C -16 -54, -12 -68, -16 -82"/>

      <!-- Inner loop near frontal -->
      <path d="M -54 -76
               C -68 -68, -76 -56, -68 -44
               C -60 -36, -50 -42, -52 -56"/>

      <!-- Long S-curve traversing the middle -->
      <path d="M -10 -48
               C -32 -48, -44 -32, -54 -22
               C -70 -10, -86 -8, -98 -18
               C -110 -28, -124 -16, -120 -2
               C -116 12, -100 14, -88 8"/>

      <!-- Mid-hemisphere sweeping curve -->
      <path d="M -22 -16
               C -44 -10, -58 6, -52 22
               C -46 38, -28 38, -22 22
               C -18 10, -22 -8, -22 -16"/>

      <!-- Extra curl branching off -->
      <path d="M -68 14
               C -82 22, -88 38, -78 48
               C -68 56, -56 50, -54 38"/>

      <!-- Lateral lower arc -->
      <path d="M -132 16
               C -136 36, -126 56, -110 56
               C -100 56, -96 44, -100 32
               C -106 18, -120 14, -126 18"/>

      <!-- Posterior winding curve -->
      <path d="M -16 36
               C -30 42, -40 60, -30 74
               C -20 86, -10 80, -10 66"/>

      <!-- Bottom-middle sweep -->
      <path d="M -50 60
               C -68 68, -65 86, -56 96
               C -50 104, -34 96, -32 84
               C -32 76, -38 64, -44 62"/>

      <!-- Occipital pole curl -->
      <path d="M -88 78
               C -100 92, -98 110, -82 110
               C -68 110, -62 94, -70 84"/>

      <!-- Short inner accent -->
      <path d="M -22 84
               C -32 92, -32 106, -22 110"/>
    </g>

    <!-- RIGHT hemisphere - mirrored -->
    <g stroke="#141414" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 28 -118 C 50 -110, 60 -92, 74 -88 C 90 -84, 100 -72, 94 -56 C 88 -42, 106 -36, 118 -42 C 130 -48, 134 -28, 128 -14"/>
      <path d="M 8 -100 C 20 -88, 36 -84, 42 -68 C 46 -56, 38 -46, 28 -50 C 16 -54, 12 -68, 16 -82"/>
      <path d="M 54 -76 C 68 -68, 76 -56, 68 -44 C 60 -36, 50 -42, 52 -56"/>
      <path d="M 10 -48 C 32 -48, 44 -32, 56 -22 C 70 -10, 86 -8, 98 -18 C 110 -28, 124 -16, 120 -2 C 116 12, 100 14, 88 8"/>
      <path d="M 22 -16 C 44 -10, 58 6, 52 22 C 46 38, 28 38, 22 22 C 18 10, 22 -8, 22 -16"/>
      <path d="M 68 14 C 82 22, 88 38, 78 48 C 68 56, 56 50, 54 38"/>
      <path d="M 132 16 C 136 36, 126 56, 110 56 C 100 56, 96 44, 100 32 C 106 18, 120 14, 126 18"/>
      <path d="M 16 36 C 30 42, 40 60, 30 74 C 20 86, 10 80, 10 66"/>
      <path d="M 50 60 C 68 68, 65 86, 56 96 C 50 104, 34 96, 32 84 C 32 76, 38 64, 44 62"/>
      <path d="M 88 78 C 100 92, 98 110, 82 110 C 68 110, 62 94, 70 84"/>
      <path d="M 22 84 C 32 92, 32 106, 22 110"/>
    </g>
  </g>

  <text x="200" y="468" font-family="'Helvetica Neue','Inter','Arial',sans-serif" font-size="60" font-weight="800" fill="#f4f1ea" text-anchor="middle" letter-spacing="-1.5">PyCat</text>
  <text x="600" y="468" font-family="'Helvetica Neue','Inter','Arial',sans-serif" font-size="60" font-weight="800" fill="#141414" text-anchor="middle" letter-spacing="-1.5">T1Prep</text>
</svg>
